name: Students Ml CI pipeline

on:
    Push:
        branches:
              - main
    pull_request:
        branches:
              - main

jobs:
    bulid:
        runs-on: Ubuntu-latest
        steps:
           - name: Checkout Repositery
             uses: actions/checkout@v4

           - name: Setup python
             uses: actions/setup-python@v5
             with:
              python-version: "3.10"
              
           - name: Install Dependencies
             run: |
              pip install -r requirements.txt
           - name: Train Model
             run: |
              python src/train.py 
           - name: Run Tests
             run: |
               pytest
  
